<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div *ngIf="authService.isAuthenticated()" class="app-container d-flex vh-100 overflow-hidden font-sans text-wedding-dark">

  <aside class="sidebar d-none d-md-flex flex-column bg-white border-end z-2 flex-shrink-0">
    <div class="p-4 border-bottom d-flex align-items-center justify-content-center">
      <h1 class="font-serif fs-4 fw-bold fst-italic tracking-wide m-0">Painel dos Noivos</h1>
    </div>

    <div class="p-4 flex-grow-1">
      <div class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">
        Menu Principal
      </div>
      <nav class="nav flex-column gap-2">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
           class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
          <i class="fa-solid fa-house text-center" style="width: 20px;"></i>
          <span>Visão Geral</span>
        </a>

        <a routerLink="/tasks" routerLinkActive="active"
           class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
          <i class="fa-solid fa-list-check text-center" style="width: 20px;"></i>
          <span>Tarefas</span>
          <span class="badge bg-wedding-primary rounded-pill ms-auto">{{ taskService.pendingCount() }}</span>
        </a>

        <a routerLink="/guests" routerLinkActive="active"
           class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
          <i class="fa-solid fa-users text-center" style="width: 20px;"></i>
          <span>Convidados</span>
        </a>

        <a routerLink="/budget" routerLinkActive="active"
           class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
          <i class="fa-solid fa-wallet text-center" style="width: 20px;"></i>
          <span>Orçamento</span>
        </a>

        <a routerLink="/vendors" routerLinkActive="active"
           class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
          <i class="fa-solid fa-store text-center" style="width: 20px;"></i>
          <span>Fornecedores</span>
        </a>
      </nav>
    </div>

    <div class="p-4 border-top d-flex flex-column gap-1">
      <a routerLink="/settings" routerLinkActive="active" class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3">
        <i class="fa-solid fa-gear text-center" style="width: 20px;"></i>
        <span>Configurações</span>
      </a>

      <button (click)="onLogout()" class="nav-link custom-nav-link d-flex align-items-center gap-3 px-3 py-2 rounded-3 border-0 bg-transparent text-danger text-start w-100">
        <i class="fa-solid fa-right-from-bracket text-center" style="width: 20px;"></i>
        <span>Sair do Sistema</span>
      </button>
    </div>
  </aside>

  <main class="flex-grow-1 d-flex flex-column position-relative overflow-y-auto pb-5 pb-md-0 bg-wedding-bg">

    <header class="bg-white sticky-top px-4 py-3 d-flex justify-content-between align-items-center border-bottom z-3">
      <div class="d-flex align-items-center gap-3">
        <h1 class="font-serif fs-4 fw-bold fst-italic m-0 d-md-none">Painel</h1>
        <div class="d-none d-md-block">
          <h2 class="fs-5 fw-medium m-0">Planejamento</h2>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb m-0 small">
              <li class="breadcrumb-item"><a href="#" class="text-muted text-decoration-none hover-primary">Início</a></li>
              <li class="breadcrumb-item active text-wedding-primary" aria-current="page">Painel</li>
            </ol>
          </nav>
        </div>
      </div>

      <div class="d-flex align-items-center gap-3">
        <div (click)="onLogout()" title="Clique para Sair"
             class="rounded-circle overflow-hidden shadow-sm border border-2 border-white cursor-pointer ms-2 position-relative btn-avatar-logout"
             style="width: 40px; height: 40px; background-color: #D4B8B1;">
          <img src="https://placehold.co/100x100/D4B8B1/ffffff?text=Sair" alt="Perfil"
               class="w-100 h-100 object-fit-cover">
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>

  </main>

  <nav class="d-md-none fixed-bottom bg-white border-top py-2 px-4 d-flex justify-content-between align-items-center shadow-lg z-3 pb-safe">
    <a routerLink="/" routerLinkActive="text-wedding-primary" [routerLinkActiveOptions]="{exact: true}"
       class="text-decoration-none d-flex flex-column align-items-center text-muted hover-primary">
      <i class="fa-solid fa-house fs-5 mb-1"></i>
      <span class="fw-medium" style="font-size: 0.65rem;">Início</span>
    </a>

    <a routerLink="/tasks" routerLinkActive="text-wedding-primary"
       class="text-decoration-none d-flex flex-column align-items-center text-muted hover-primary">
      <i class="fa-solid fa-list-check fs-5 mb-1"></i>
      <span class="fw-medium" style="font-size: 0.65rem;">Tarefas</span>
    </a>

    <div class="position-relative" style="top: -20px;">
      <button class="btn btn-wedding-primary text-white rounded-circle shadow d-flex align-items-center justify-content-center action-btn"
              style="width: 50px; height: 50px;">
        <i class="fa-solid fa-plus fs-4"></i>
      </button>
    </div>

    <a routerLink="/guests" routerLinkActive="text-wedding-primary"
       class="text-decoration-none d-flex flex-column align-items-center text-muted hover-primary">
      <i class="fa-solid fa-users fs-5 mb-1"></i>
      <span class="fw-medium" style="font-size: 0.65rem;">Convidados</span>
    </a>

    <a routerLink="/budget" routerLinkActive="text-wedding-primary"
       class="text-decoration-none d-flex flex-column align-items-center text-muted hover-primary">
      <i class="fa-solid fa-wallet fs-5 mb-1"></i>
      <span class="fw-medium" style="font-size: 0.65rem;">Orçamento</span>
    </a>
  </nav>

</div>

<div *ngIf="!authService.isAuthenticated()">
  <router-outlet></router-outlet>
</div>
