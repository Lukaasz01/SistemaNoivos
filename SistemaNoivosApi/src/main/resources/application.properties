spring.application.name=SistemaNoivosApi

# ? Conexăo Direta com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sistemanoivos
spring.datasource.username=postgres
spring.datasource.password=Poider01#
spring.datasource.driver-class-name=org.postgresql.Driver

# ? Configuraçőes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ? Ativaçăo do Flyway para Migraçőes de Banco
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.security.user.name=admin
spring.security.user.password=admin123
server.port=9001